name: Dependency checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, audit, and Cloudflare build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check for known high-severity vulnerabilities
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build the Cloudflare Worker
        run: npm run build:cloudflare

