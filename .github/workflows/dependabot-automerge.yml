name: Dependabot auto-merge

# This privileged workflow only runs after the read-only verification workflow.
# It never checks out or executes code from the pull request.
on:
  workflow_run:
    workflows:
      - Dependency checks
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-safe-update:
    name: Merge verified patch or security update
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Merge eligible Dependabot pull request
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          case "$HEAD_BRANCH" in
            dependabot/npm_and_yarn/patch-updates-*|dependabot/npm_and_yarn/security-patch-updates-*)
              gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --squash --delete-branch
              ;;
            *)
              echo "Manual approval required for $HEAD_BRANCH"
              ;;
          esac
