name: Deploy Dependabot preview

# This workflow only receives Cloudflare credentials after the unprivileged
# verification workflow succeeds. It deploys Dependabot's minor/major groups
# to one fixed, password-protected Worker hostname.
on:
  workflow_run:
    workflows:
      - Dependency checks
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: dependabot-preview
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy verified minor or major update
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      (startsWith(github.event.workflow_run.head_branch, 'dependabot/npm_and_yarn/minor-updates-') ||
       startsWith(github.event.workflow_run.head_branch, 'dependabot/npm_and_yarn/major-updates-'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: dependabot-preview
      url: https://preview.mercator-musicschool.com
    steps:
      - name: Check out the verified Dependabot revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build the fixed preview Worker
        run: npm run build:cloudflare:preview
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      # The first deploy creates the Worker and Custom Domain. Until the two
      # secrets are present, the Worker responds 503 and serves no site content.
      - name: Deploy preview Worker in locked state
        run: npm run deploy:dependabot-preview:built
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set preview authentication secrets
        run: |
          if [ -z "$PREVIEW_AUTH_USERNAME" ] || [ -z "$PREVIEW_AUTH_PASSWORD" ]; then
            echo "Set PREVIEW_AUTH_USERNAME and PREVIEW_AUTH_PASSWORD as GitHub Actions secrets before deploying the preview."
            exit 1
          fi
          username_file="$(mktemp)"
          password_file="$(mktemp)"
          trap 'rm -f "$username_file" "$password_file"' EXIT
          printf '%s' "$PREVIEW_AUTH_USERNAME" > "$username_file"
          printf '%s' "$PREVIEW_AUTH_PASSWORD" > "$password_file"
          npx wrangler secret put PREVIEW_AUTH_USERNAME --env dependabot-preview < "$username_file"
          npx wrangler secret put PREVIEW_AUTH_PASSWORD --env dependabot-preview < "$password_file"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_AUTH_USERNAME: ${{ secrets.PREVIEW_AUTH_USERNAME }}
          PREVIEW_AUTH_PASSWORD: ${{ secrets.PREVIEW_AUTH_PASSWORD }}

      - name: Deploy preview Worker with authentication enabled
        run: npm run deploy:dependabot-preview:built
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
